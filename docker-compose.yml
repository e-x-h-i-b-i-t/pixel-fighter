version: '3.8'

services:
  # ── RL API Server ─────────────────────────────────────────────────────────
  rl-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      # Persist the Q-table JSON file across container restarts
      - rl_data:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Game Client (Vite dev server) ─────────────────────────────────────────
  game:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_RL_API_URL=http://localhost:4000/api/ai
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      rl-api:
        condition: service_healthy

volumes:
  rl_data:
